name: Deploy Next.js site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *" # Daily at 06:00 UTC — picks up new GameThemeMusic-NG releases automatically

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Detect package manager
        id: detect-package-manager
        run: |
          if [ -f "${{ github.workspace }}/merinocodes/yarn.lock" ]; then
            echo "manager=yarn" >> $GITHUB_OUTPUT
            echo "command=install" >> $GITHUB_OUTPUT
            echo "runner=yarn" >> $GITHUB_OUTPUT
            exit 0
          elif [ -f "${{ github.workspace }}/merinocodes/package.json" ]; then
            echo "manager=npm" >> $GITHUB_OUTPUT
            echo "command=ci" >> $GITHUB_OUTPUT
            echo "runner=npx --no-install" >> $GITHUB_OUTPUT
            exit 0
          else
            echo "Unable to determine package manager"
            exit 1
          fi
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: ${{ steps.detect-package-manager.outputs.manager }}
          cache-dependency-path: "merinocodes/package-lock.json"
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          static_site_generator: next
      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/merinocodes/package-lock.json', '**/merinocodes/yarn.lock') }}-${{ hashFiles('**/merinocodes/*.[jt]s', '**/merinocodes/*.[jt]sx') }}
          restore-keys: ${{ runner.os }}-nextjs-${{ hashFiles('**/merinocodes/package-lock.json', '**/merinocodes/yarn.lock') }}-
      - name: Install dependencies
        run: ${{ steps.detect-package-manager.outputs.manager }} ${{ steps.detect-package-manager.outputs.command }}
        working-directory: ./merinocodes
      - name: Download latest GameThemeMusic-NG release zip
        run: |
          # Remove the directory-based JS redirect and replace it with the real binary
          rm -rf merinocodes/public/gamethememusic/latest.zip
          mkdir -p merinocodes/public/gamethememusic
          RELEASE_INFO=$(curl -s -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/cmerino01/GameThemeMusic-NG/releases/latest")
          DOWNLOAD_URL=$(echo "$RELEASE_INFO" | \
            jq -r '.assets[] | select(.name | endswith(".zip")) | .browser_download_url' | head -1)
          if [ -n "$DOWNLOAD_URL" ] && [ "$DOWNLOAD_URL" != "null" ]; then
            curl -L -o merinocodes/public/gamethememusic/latest.zip "$DOWNLOAD_URL"
            echo "Downloaded zip from: $DOWNLOAD_URL"
          else
            echo "No zip asset found in latest release"
            exit 1
          fi
      - name: Build with Next.js
        run: ${{ steps.detect-package-manager.outputs.runner }} next build
        working-directory: ./merinocodes
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./merinocodes/out
      - name: Set page_url output
        run: echo "page_url=https://${{ github.repository_owner }}.github.io/${{ github.repository }}" >> $GITHUB_OUTPUT

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
