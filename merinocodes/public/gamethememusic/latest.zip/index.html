<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="robots" content="noindex" />
    <title>Redirecting to GameThemeMusic-NG latest release…</title>
    <script>
      (async function () {
        const RELEASES_PAGE =
          "https://github.com/cmerino01/GameThemeMusic-NG/releases/latest";
        try {
          const res = await fetch(
            "https://api.github.com/repos/cmerino01/GameThemeMusic-NG/releases/latest",
            { headers: { Accept: "application/vnd.github+json" } },
          );
          if (!res.ok) throw new Error("API request failed");
          const data = await res.json();
          const asset = (data.assets || []).find((a) =>
            a.name.endsWith(".zip"),
          );
          window.location.replace(
            asset ? asset.browser_download_url : RELEASES_PAGE,
          );
        } catch (_) {
          window.location.replace(RELEASES_PAGE);
        }
      })();
    </script>
  </head>
  <body>
    <p>
      Redirecting to the latest GameThemeMusic-NG release&hellip;
      <a href="https://github.com/cmerino01/GameThemeMusic-NG/releases/latest"
        >Click here if you are not redirected.</a
      >
    </p>
  </body>
</html>
